# 모든 수집(네이버 매물·국토부 실거래·KB시세)은 로컬 Mac의 launchd에서 수행한다.
# 이유: 한국 서비스(네이버·국토부)가 GitHub Actions 데이터센터 IP를 차단·타임아웃시킨다.
#   - 네이버: ECONNRESET, 국토부: UND_ERR_CONNECT_TIMEOUT
# 이 워크플로우는 수동 실행(workflow_dispatch)만 남겨둔다 — 평소엔 돌지 않아 실패 알람이 없다.
# 로컬 수집 구성은 README "로컬 Mac launchd" 섹션 참고.
name: collect

on:
  workflow_dispatch:

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 데이터센터 IP에서는 국토부·KB 접속이 불안정하다. 수동 실행 시에만 시도.
      - name: Collect MOLIT trades
        run: npx tsx scripts/collect-trades.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      - name: Collect KB prices
        if: always()
        run: npx tsx scripts/collect-kb.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
